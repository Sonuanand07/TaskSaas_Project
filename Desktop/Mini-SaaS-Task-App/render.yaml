services:
  # Backend Node.js API
  - type: web
    name: backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 10000  # Render assigns $PORT automatically
    
  # Frontend Static Site  
  - type: web
    name: frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist

